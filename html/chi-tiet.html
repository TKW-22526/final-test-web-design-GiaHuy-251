<!DOCTYPE html>
<html lang="vi">
	<head>
		<title>Chi tiết</title>
		<meta charset ="utf-8">
		<link rel ="stylesheet" href ="../css/style03.css">
		<script src = "../js/script.js"></script>
	</head>
	<body>
		<div class="container" id ="container">
			
			<img src = "../assets/ho.jpg" alt = "ảnh" id ="image">
			<h1 id="name"></h1>
        	<h2 id="tenkh"></h2>
        	
			<div id="info-details"></div>
           
        	<a href="../html/san-pham.html" class="back-btn"><button>← Quay lại</button></a>
		</div>

		<script>
			// Lấy ID từ URL
			const urlParams = new URLSearchParams(window.location.search);
			const productId = urlParams.get("masp");
			
			// Tìm sản phẩm trong mảng dựa vào ID vừa lấy
			const foundProduct = products.find(obj => obj.id === productId);

			// Hiển thị dữ liệu ra giao diện
			if (foundProduct) {
				// Các thông tin chung ở trên cùng
				document.getElementById("name").innerText = foundProduct.name;
				document.getElementById("tenkh").innerText = foundProduct.tenkh;
				document.getElementById("image").src = foundProduct.image;
				
				// Nơi sẽ chèn các dòng thông tin vào
				const infoDetails = document.getElementById("info-details");
				let htmlContent = "";

				// KIỂM TRA: Nếu là ĐỘNG VẬT (có tập tính 'tt' hoặc thức ăn 'ta')
				if (foundProduct.tt || foundProduct.ta) {
					// Sinh ra đúng 5 dòng cho Động vật (gồm Đặc điểm + 4 thuộc tính riêng)
					htmlContent = `
						<p><strong>Đặc điểm:</strong> ${foundProduct.description || "Chưa cập nhật"}</p>
						<p><strong>Tập tính:</strong> ${foundProduct.tt || "Chưa cập nhật"}</p>
						<p><strong>Môi trường sống:</strong> ${foundProduct.mt || "Chưa cập nhật"}</p>
						<p><strong>Thức ăn:</strong> ${foundProduct.ta || "Chưa cập nhật"}</p>
						<p><strong>Tình trạng bảo tồn:</strong> ${foundProduct.bt || "Chưa cập nhật"}</p>
					`;
				} 
				// NGƯỢC LẠI: Nếu là THỰC VẬT
				else {
					// Sinh ra đúng 4 dòng cho Thực vật (gồm Đặc điểm + 3 thuộc tính riêng)
					htmlContent = `
						<p><strong>Đặc điểm:</strong> ${foundProduct.description || "Chưa cập nhật"}</p>
						<p><strong>Đặc tính sinh trưởng:</strong> ${foundProduct.dt || "Chưa cập nhật"}</p>
						<p><strong>Môi trường sống:</strong> ${foundProduct.mts || "Chưa cập nhật"}</p>
						<p><strong>Vai trò:</strong> ${foundProduct.vt || "Chưa cập nhật"}</p>
					`;
				}

				// Đổ toàn bộ nội dung đã tính toán vào trong thẻ div
				infoDetails.innerHTML = htmlContent;
	
			} else {
				document.getElementById("container").innerHTML = `<h2> Sản phẩm không tồn tại hoặc đã bị xóa</h2><a href = "../index.html">Quay lại trang chủ</a>`;
			}
		</script>
	</body>
</html>
